
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oneapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneapp_user
      POSTGRES_PASSWORD: oneapp_password_2024
      POSTGRES_DB: oneapp
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - oneapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneapp_user -d oneapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: oneapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass oneapp_redis_2024
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - oneapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One App Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oneapp-backend
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://oneapp_user:oneapp_password_2024@postgres:5432/oneapp
      REDIS_URL: redis://:oneapp_redis_2024@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: oneapp_redis_2024
      JWT_SECRET: dev-jwt-secret-change-in-production-12345
      JWT_EXPIRY: 1h
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-12345
      JWT_REFRESH_EXPIRY: 7d
      ENCRYPTION_KEY: c9a16265ffec46c896cce20ec779b223
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oneapp-network
    volumes:
      - ./logs:/app/logs

  # pgAdmin - Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oneapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oneapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - oneapp-network
    depends_on:
      - postgres

networks:
  oneapp-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
